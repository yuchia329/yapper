apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels: {app: yapper, component: api}
spec:
  replicas: 2
  selector:
    matchLabels: {app: yapper, component: api}
  template:
    metadata:
      labels: {app: yapper, component: api}
    spec:
      containers:
        - name: api
          image: yapper:latest
          imagePullPolicy: IfNotPresent
          command: ["gunicorn", "yapper_web.api:app",
                    "-k", "uvicorn.workers.UvicornWorker",
                    "-b", "0.0.0.0:8000", "--workers", "2", "--timeout", "120"]
          ports: [{containerPort: 8000}]
          envFrom:
            - configMapRef: {name: yapper-config}
            - secretRef: {name: yapper-secrets}
          readinessProbe:
            httpGet: {path: /healthz, port: 8000}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /healthz, port: 8000}
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests: {cpu: "100m", memory: "256Mi"}
            limits: {cpu: "1", memory: "1Gi"}
---
apiVersion: v1
kind: Service
metadata:
  name: api
  labels: {app: yapper, component: api}
spec:
  selector: {app: yapper, component: api}
  ports: [{name: http, port: 80, targetPort: 8000}]
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: yapper
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    # SSE: disable proxy buffering for the run-events stream.
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port: {number: 80}
