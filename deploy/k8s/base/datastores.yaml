# In-cluster Postgres + Redis (chosen for prod too). Overlays size the PVCs.
apiVersion: v1
kind: Service
metadata: {name: postgres, labels: {app: yapper, component: postgres}}
spec:
  clusterIP: None
  selector: {app: yapper, component: postgres}
  ports: [{port: 5432, targetPort: 5432}]
---
apiVersion: apps/v1
kind: StatefulSet
metadata: {name: postgres}
spec:
  serviceName: postgres
  replicas: 1
  selector: {matchLabels: {app: yapper, component: postgres}}
  template:
    metadata: {labels: {app: yapper, component: postgres}}
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - {name: POSTGRES_USER, value: jieshuo}
            - {name: POSTGRES_DB, value: jieshuo}
            - name: POSTGRES_PASSWORD
              valueFrom: {secretKeyRef: {name: yapper-secrets, key: POSTGRES_PASSWORD}}
            - {name: PGDATA, value: /var/lib/postgresql/data/pgdata}
          ports: [{containerPort: 5432}]
          volumeMounts: [{name: pgdata, mountPath: /var/lib/postgresql/data}]
          readinessProbe:
            exec: {command: ["pg_isready", "-U", "jieshuo"]}
            initialDelaySeconds: 10
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata: {name: pgdata}
      spec:
        accessModes: ["ReadWriteOnce"]
        resources: {requests: {storage: 10Gi}}
---
apiVersion: v1
kind: Service
metadata: {name: redis, labels: {app: yapper, component: redis}}
spec:
  clusterIP: None
  selector: {app: yapper, component: redis}
  ports: [{port: 6379, targetPort: 6379}]
---
apiVersion: apps/v1
kind: StatefulSet
metadata: {name: redis}
spec:
  serviceName: redis
  replicas: 1
  selector: {matchLabels: {app: yapper, component: redis}}
  template:
    metadata: {labels: {app: yapper, component: redis}}
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--appendonly", "yes"]
          ports: [{containerPort: 6379}]
          volumeMounts: [{name: redisdata, mountPath: /data}]
          readinessProbe:
            exec: {command: ["redis-cli", "ping"]}
            initialDelaySeconds: 5
            periodSeconds: 10
  volumeClaimTemplates:
    - metadata: {name: redisdata}
      spec:
        accessModes: ["ReadWriteOnce"]
        resources: {requests: {storage: 2Gi}}
