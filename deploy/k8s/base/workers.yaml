---
apiVersion: apps/v1
kind: Deployment
metadata: {name: worker-render, labels: {app: yapper, component: worker-render}}
spec:
  replicas: 1
  selector: {matchLabels: {app: yapper, component: worker-render}}
  template:
    metadata: {labels: {app: yapper, component: worker-render}}
    spec:
      containers:
        - name: worker
          image: yapper:latest
          imagePullPolicy: IfNotPresent
          command: ["celery", "-A", "yapper_web.tasks", "worker", "-Q", "render", "-n", "render@%h", "--concurrency", "2", "-l", "info"]
          envFrom: [{configMapRef: {name: yapper-config}}, {secretRef: {name: yapper-secrets}}]
