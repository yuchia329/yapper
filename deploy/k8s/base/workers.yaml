# Celery workers split by resource class + the beat scheduler. Each pod has its own
# emptyDir WORK_ROOT cache; S3 is the source of truth, so a phase task on any pod
# re-materializes what it needs (no shared RWX volume required). worker-asr and
# worker-tts are separate (different GPUs -> they overlap) and each pinned to
# replicas:1 / concurrency:1 because one model per GPU is serialized.
apiVersion: apps/v1
kind: Deployment
metadata: {name: worker-cpu, labels: {app: yapper, component: worker-cpu}}
spec:
  replicas: 1
  selector: {matchLabels: {app: yapper, component: worker-cpu}}
  template:
    metadata: {labels: {app: yapper, component: worker-cpu}}
    spec:
      containers:
        - name: worker
          image: yapper:latest
          imagePullPolicy: IfNotPresent
          command: ["celery", "-A", "yapper_web.tasks", "worker", "-Q", "cpu", "-n", "cpu@%h", "--concurrency", "2", "-l", "info"]
          envFrom: [{configMapRef: {name: yapper-config}}, {secretRef: {name: yapper-secrets}}]
          volumeMounts: [{name: work, mountPath: /scratch/work}]
          resources: {requests: {cpu: "250m", memory: "512Mi"}, limits: {cpu: "2", memory: "2Gi"}}
      volumes: [{name: work, emptyDir: {}}]
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: worker-asr, labels: {app: yapper, component: worker-asr}}
spec:
  replicas: 1                         # one ASR model per GPU -> serialize
  selector: {matchLabels: {app: yapper, component: worker-asr}}
  template:
    metadata: {labels: {app: yapper, component: worker-asr}}
    spec:
      containers:
        - name: worker
          image: yapper:latest
          imagePullPolicy: IfNotPresent
          command: ["celery", "-A", "yapper_web.tasks", "worker", "-Q", "asr", "-n", "asr@%h", "--concurrency", "3", "-l", "info"]
          envFrom: [{configMapRef: {name: yapper-config}}, {secretRef: {name: yapper-secrets}}]
          volumeMounts: [{name: work, mountPath: /scratch/work}]
          resources: {requests: {cpu: "100m", memory: "512Mi"}, limits: {cpu: "1", memory: "2Gi"}}
      volumes: [{name: work, emptyDir: {}}]
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: worker-tts, labels: {app: yapper, component: worker-tts}}
spec:
  replicas: 1                         # one TTS model per GPU -> serialize (overlaps ASR)
  selector: {matchLabels: {app: yapper, component: worker-tts}}
  template:
    metadata: {labels: {app: yapper, component: worker-tts}}
    spec:
      containers:
        - name: worker
          image: yapper:latest
          imagePullPolicy: IfNotPresent
          command: ["celery", "-A", "yapper_web.tasks", "worker", "-Q", "tts", "-n", "tts@%h", "--concurrency", "3", "-l", "info"]
          envFrom: [{configMapRef: {name: yapper-config}}, {secretRef: {name: yapper-secrets}}]
          volumeMounts: [{name: work, mountPath: /scratch/work}]
          resources: {requests: {cpu: "100m", memory: "512Mi"}, limits: {cpu: "1", memory: "2Gi"}}
      volumes: [{name: work, emptyDir: {}}]
---
