      volumes: [{name: work, emptyDir: {}}]
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: beat, labels: {app: yapper, component: beat}}
spec:
  replicas: 1
  selector: {matchLabels: {app: yapper, component: beat}}
  template:
    metadata: {labels: {app: yapper, component: beat}}
    spec:
      containers:
        - name: beat
          image: yapper:latest
          imagePullPolicy: IfNotPresent
          command: ["celery", "-A", "yapper_web.tasks", "beat", "-l", "info"]
          envFrom: [{configMapRef: {name: yapper-config}}, {secretRef: {name: yapper-secrets}}]
          resources: {requests: {cpu: "50m", memory: "128Mi"}, limits: {cpu: "250m", memory: "256Mi"}}
