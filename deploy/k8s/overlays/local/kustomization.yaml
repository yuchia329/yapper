apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# LOCAL (kind/minikube): MinIO for files, in-cluster pg/redis, NodePort access.
# Build + load the image first:  docker build -f deploy/Dockerfile -t yapper:latest .
#                                kind load docker-image yapper:latest
# Then:  kubectl apply -k deploy/k8s/overlays/local
# App on http://localhost:30800 ; MinIO console http://localhost:30901
resources:
  - ../../base
  - minio.yaml

patches:
  - path: patch-config.yaml
  - path: patch-secret.yaml
  - path: patch-api-nodeport.yaml
