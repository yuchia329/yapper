# MinIO for local k8s (object store; no AWS). Exposed via NodePort 30900 so the browser
# can reach the presigned-URL host (S3_PUBLIC_ENDPOINT_URL=http://localhost:30900).
apiVersion: apps/v1
kind: Deployment
metadata: {name: minio, labels: {app: yapper, component: minio}}
spec:
  replicas: 1
  selector: {matchLabels: {app: yapper, component: minio}}
  template:
    metadata: {labels: {app: yapper, component: minio}}
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - {name: MINIO_ROOT_USER, value: minioadmin}
            - {name: MINIO_ROOT_PASSWORD, value: minioadmin}
          ports: [{containerPort: 9000}, {containerPort: 9001}]
          volumeMounts: [{name: data, mountPath: /data}]
      volumes: [{name: data, emptyDir: {}}]
---
apiVersion: v1
kind: Service
metadata: {name: minio, labels: {app: yapper, component: minio}}
spec:
  type: NodePort
  selector: {app: yapper, component: minio}
  ports:
    - {name: s3, port: 9000, targetPort: 9000, nodePort: 30900}
    - {name: console, port: 9001, targetPort: 9001, nodePort: 30901}
---
# one-shot bucket creation
apiVersion: batch/v1
kind: Job
metadata: {name: minio-createbucket}
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:latest
          command: ["/bin/sh", "-c"]
          args:
            - >
              until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 2; done;
              mc mb -p local/jieshuo-artifacts || true;
              echo done
