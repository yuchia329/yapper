# Local: MinIO credentials (boto3 reads AWS_* from env). Not real secrets locally.
apiVersion: v1
kind: Secret
metadata: {name: yapper-secrets}
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "minioadmin"
  AWS_SECRET_ACCESS_KEY: "minioadmin"
  # LLM_API_KEY / SESSION_SECRET still come from base (replace before applying).
