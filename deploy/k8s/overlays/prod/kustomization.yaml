apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# PRODUCTION on the yuchia.dev k3s box (single-node, ARM64, Traefik ingress, AWS S3).
# Tuned for THIS cluster (not generic): namespace `yapper`, Traefik host-routing (no
# cert-manager — TLS is terminated at Cloudflare's edge), one combined Celery worker
# (the box is small + GPU is on-demand), and a standalone gpu-tunnel Deployment that SSH-
# forwards gpud (mirrors the working video-search gpu-tunnel) instead of per-worker sidecars.
#
# Secrets (yapper-secrets, gpu-ssh-key) are NOT emitted here — Terraform owns them
# (deploy/terraform). Apply via Terraform (kustomization provider) or directly:
#   kubectl apply -k deploy/k8s/overlays/prod        # after TF has created the secrets
namespace: yapper

resources:
  - ../../base
  - gpu-tunnel.yaml
  - observability.yaml             # ServiceMonitors + PrometheusRule (applied via kbst, not kubernetes_manifest)

patches:
  - path: patch-config.yaml        # S3 prod bucket, gpud target, GPU box host, forwarded-proto, cookie
  - path: patch-ingress.yaml       # Traefik + host yapper.yuchia.dev (drops the nginx annotations)
  - path: patch-api.yaml           # replicas 1 + right-sized for the shared 2 vCPU / 8 GB box
  - path: patch-workers.yaml       # repurpose worker-cpu as the single combined worker; bound scratch

  # Remove the unused per-queue workers + beat (one worker drains all queues; no periodic tasks).
  - target: {group: apps, version: v1, kind: Deployment, name: worker-asr}
    patch: |
      $patch: delete
      apiVersion: apps/v1
      kind: Deployment
      metadata: {name: worker-asr}
  - target: {group: apps, version: v1, kind: Deployment, name: worker-tts}
    patch: |
      $patch: delete
      apiVersion: apps/v1
      kind: Deployment
      metadata: {name: worker-tts}
  - target: {group: apps, version: v1, kind: Deployment, name: worker-llm}
    patch: |
      $patch: delete
      apiVersion: apps/v1
      kind: Deployment
      metadata: {name: worker-llm}
  - target: {group: apps, version: v1, kind: Deployment, name: worker-render}
    patch: |
      $patch: delete
      apiVersion: apps/v1
      kind: Deployment
      metadata: {name: worker-render}
  - target: {group: apps, version: v1, kind: Deployment, name: beat}
    patch: |
      $patch: delete
      apiVersion: apps/v1
      kind: Deployment
      metadata: {name: beat}

  # Drop the placeholder Secrets — Terraform owns the real yapper-secrets + gpu-ssh-key.
  - target: {version: v1, kind: Secret, name: yapper-secrets}
    patch: |
      $patch: delete
      apiVersion: v1
      kind: Secret
      metadata: {name: yapper-secrets}
  - target: {version: v1, kind: Secret, name: gpu-ssh-key}
    patch: |
      $patch: delete
      apiVersion: v1
      kind: Secret
      metadata: {name: gpu-ssh-key}

images:
  - name: yapper
    newName: docker.io/yuchia329/yapper                 # pushed to Docker Hub (scripts/build_and_push.sh) OR side-loaded into k3s (scripts/build_and_load.sh)
    newTag: latest                 # override with the git sha at apply time (TF_VAR_image_tag)
