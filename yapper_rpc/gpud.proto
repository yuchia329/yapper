syntax = "proto3";

package yapper_rpc;

// gpud — the on-demand GPU supervisor. Runs always-on (no model loaded) on the GPU box
// and owns a bounded pool of ASR/TTS model-server subprocesses. A worker leases an
// instance for the duration of one Celery task: gpud launches one on a GPU with free
// vRAM (or hands back a warm idle one), returns its address, and reaps it after an idle
// grace once released. Workers dial the returned `target` directly over gRPC (the model
// traffic never passes through gpud — it's control-plane only).
service Gpud {
  // Ensure an instance of `service` is running and lease it exclusively. Blocks up to
  // the server's acquire timeout when the pool is full / no GPU fits, then fails
  // UNAVAILABLE so the caller can retry.
  rpc Acquire(AcquireRequest) returns (Lease);
  // Refresh a lease's TTL so the instance isn't reclaimed mid-task (crash safety).
  rpc Heartbeat(LeaseRef) returns (HeartbeatReply);
  // Release a lease -> the instance goes idle and is reaped after the idle grace.
  rpc Release(LeaseRef) returns (ReleaseReply);
  // Pool snapshot (for debugging / status).
  rpc Status(StatusRequest) returns (StatusReply);
}

message AcquireRequest {
  string service = 1;   // "asr" | "tts"
}

message Lease {
  string lease_id = 1;
  string target = 2;    // host:port the worker dials (a port from the reserved range)
  string service = 3;
  bool ready = 4;       // server passed grpc.health.v1 SERVING before returning
}

message LeaseRef {
  string lease_id = 1;
}

message HeartbeatReply { bool ok = 1; }
message ReleaseReply { bool ok = 1; }

message StatusRequest {}

message InstanceStatus {
  string service = 1;
  string target = 2;
  int32 gpu_index = 3;
  bool leased = 4;
  string lease_id = 5;
}

message GpuStatus {
  int32 index = 1;
  int64 free_mb = 2;
  int64 total_mb = 3;
}

message StatusReply {
  repeated InstanceStatus instances = 1;
  repeated GpuStatus gpus = 2;
}
