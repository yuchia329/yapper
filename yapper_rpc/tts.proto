syntax = "proto3";

package yapper_rpc;

// CosyVoice2 TTS service. Mirrors the former REST contract (tts_client.py): send a
// line of text (+ seed/speed and optional cloned-voice reference) and get back a WAV.
//
// Synthesize is SERVER-STREAMING: the WAV is sent as ordered byte chunks so the
// response size is bounded regardless of line length; the client concatenates them
// into the final WAV file.
service Tts {
  rpc Synthesize(SynthesizeRequest) returns (stream AudioChunk);
}

message SynthesizeRequest {
  string text = 1;
  int32 seed = 2;
  double speed = 3;
  string ref_wav = 4;    // server-side path to the cloned-narrator reference clip; "" = service default
  string ref_text = 5;   // transcript of ref_wav; "" = service default
}

message AudioChunk {
  bytes data = 1;        // raw WAV bytes, in order (header is in the first chunk)
}
