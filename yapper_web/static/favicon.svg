<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Yapper">
  <!-- App tile in the brand accent so the icon reads on both light and dark browser tabs. -->
  <rect width="32" height="32" rx="7" fill="#5b8cff"/>
  <!-- Speech bubble (commentary) with a tail. -->
  <rect x="5" y="6" width="22" height="15" rx="4.5" fill="#fff"/>
  <path d="M11 19l-1.6 6.2 7.1-5.2z" fill="#fff"/>
  <!-- Play triangle (video) inside the bubble => "commentary on video". -->
  <path d="M13.4 9.9v7.8l6.8-3.9z" fill="#5b8cff"/>
</svg>
